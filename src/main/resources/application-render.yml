# Render 生产环境：PostgreSQL + 端口由 PORT 注入（免费实例通常为 10000）
# 数据源由 RenderDataSourceConfig 读取 DATABASE_URL 或 PGHOST 等变量
# 表结构由 Flyway 管理，见 db/migration/V1__init_schema.sql
spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    # 旧库由 Hibernate 建过表、但没有 flyway_schema_history 时，先 baseline 再补 V2 缺失表
    baseline-on-migrate: true
    baseline-version: 1
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

quote:
  cors:
    # 在 Render 环境变量中覆盖，例如：
    # CORS_ALLOWED_ORIGIN_PATTERNS=https://your-app.vercel.app,https://*.vercel.app
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app,http://localhost:*}
  # 仅 Render 一次性清库重建：环境变量 QUOTE_DB_RESET=true，部署成功后删除该变量
  db:
    reset: ${QUOTE_DB_RESET:false}
  upload-dir: /tmp/uploads
  masterdata:
    us-zip:
      enabled: false
    global-port:
      enabled: false
      sync:
        enabled: false

logging:
  level:
    root: INFO
    com.furuiduo.quote: INFO
