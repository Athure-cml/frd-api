spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

server:
  port: ${PORT:10000}
  address: 0.0.0.0

quote:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app,http://localhost:*}
  db:
    reset: ${QUOTE_DB_RESET:false}
  cost:
    reset: ${QUOTE_COST_RESET:false}
  upload-dir: /tmp/uploads
  masterdata:
    us-zip:
      enabled: false
    global-port:
      enabled: false
      sync:
        enabled: false

logging:
  level:
    root: INFO
    com.furuiduo.quote: INFO