# Render 生产环境：PostgreSQL + 端口由 PORT 注入（免费实例通常为 10000）
# 数据源由 RenderDataSourceConfig 读取 DATABASE_URL 或 PGHOST 等变量
# 表结构由 Flyway 管理，见 db/migration/V1__init_schema.sql
spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

quote:
  cors:
    # 在 Render 环境变量中覆盖，例如：
    # CORS_ALLOWED_ORIGIN_PATTERNS=https://your-app.vercel.app,https://*.vercel.app
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app,http://localhost:*}
  upload-dir: /tmp/uploads
  masterdata:
    us-zip:
      enabled: false
    global-port:
      enabled: false
      sync:
        enabled: false

logging:
  level:
    root: INFO
    com.furuiduo.quote: INFO
