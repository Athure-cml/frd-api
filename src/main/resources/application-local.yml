# [Legacy] 嵌入式 H2，仅用于无 PostgreSQL 的快速演示
# 与 Flyway V1（PostgreSQL/JSONB）不兼容，schema 可能与生产环境漂移
# 推荐改用 postgres profile
spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:file:./data/furuiduo;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
