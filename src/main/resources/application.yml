server:
  port: ${PORT:8080}

spring:
  application:
    name: quote-api
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 500
        order_inserts: true
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

quote:
  upload-dir: ./uploads
  cors:
    allowed-origin-patterns: http://localhost:*,http://127.0.0.1:*
  masterdata:
    us-zip:
      enabled: true
      file-path: ./US.txt
      skip-if-exists: true
    global-port:
      enabled: true
      skip-if-exists: true
      unlocode-csv-path: ./data/unlocode/code-list.csv
      unlocode-zip-path: ./data/unlocode/loc242csv.zip
      unlocode-official-zip-url: https://service.unece.org/trade/locode/loc242csv.zip
      unlocode-csv-url: https://raw.githubusercontent.com/datasets/un-locode/main/data/code-list.csv
      sync:
        enabled: true
        cron: "0 0 4 1 1,7 ?"
      freightutils:
        base-url: https://www.freightutils.com/api
        api-key:
        request-delay-ms: 350

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
  show-actuator: false
